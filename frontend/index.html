<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->

<html lang="en">
  <!-- Root element of the HTML document, language set to English -->

  <head>
    <meta charset="UTF-8" />
    <!-- Sets character encoding to UTF-8 (supports all characters) -->

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Adds favicon (icon shown in browser tab), here using Vite logo -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes the website responsive on different devices -->

    <meta name="description" content="OpenShelf - Hybrid Digital & Traditional Library Management System" />
    <!-- Provides description for SEO and search engines -->

    <title>OpenShelf - Library Management System</title>
    <!-- Title shown in browser tab -->
  </head>

  <body>
    <!-- Main content of the webpage -->

    <div id="root"></div>
    <!-- Root div where React app will be rendered -->

    <script type="module" src="/src/main.jsx"></script>
    <!-- Loads main React JavaScript file (entry point of the app) -->
  </body>
</html>
